name: fluoh
description: Command-line tools for FlutterOH SDK management, OHOS implementation refs, and package workflows.
version: 0.1.0
repository: https://github.com/FlutterOH/fluoh.git
issue_tracker: https://github.com/FlutterOH/fluoh/issues
topics:
  - flutteroh
  - openharmony
  - harmonyos
  - ohos
  - cli

environment:
  sdk: ^3.11.5

executables:
  fluoh:
  fluohf:

dependencies:
  args: ^2.7.0
  pub_semver: ^2.2.0
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
